name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 2.0.0)'
        required: true
        type: string
      skip_npm:
        description: 'Skip npm publish'
        type: boolean
        default: false
      skip_mcp:
        description: 'Skip MCP Registry publish'
        type: boolean
        default: false

env:
  VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  publish-npm:
    if: ${{ !inputs.skip_npm }}
    runs-on: ubuntu-latest
    continue-on-error: true  # manual publish via npm login is the fallback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    if: ${{ !inputs.skip_mcp }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Update server.json version
        env:
          RELEASE_VERSION: ${{ env.VERSION }}
        run: |
          VERSION=${RELEASE_VERSION#v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: |
          output=$(./mcp-publisher publish 2>&1) && echo "$output" && exit 0
          echo "$output"
          echo "$output" | grep -q "cannot publish duplicate version" && echo "Already published — skipping." && exit 0
          exit 1

  update-plugin-branch:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force-sync plugin branch to master
        run: git push origin HEAD:plugin --force

  create-release:
    needs: [publish-mcp-registry]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            # npm global install
            npm install -g codeseeker

            # or run directly with npx (no install needed)
            npx codeseeker serve --mcp
            ```

            Add to your MCP config (`.vscode/mcp.json`, `.cursor/mcp.json`, etc.):

            ```json
            {
              "mcpServers": {
                "codeseeker": {
                  "command": "npx",
                  "args": ["-y", "codeseeker", "serve", "--mcp"]
                }
              }
            }
            ```

